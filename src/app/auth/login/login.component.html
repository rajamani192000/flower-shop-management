<div class="login-page">
  <mat-card class="login-card">
    <h2>Flower Shop Login</h2>
    <p>Sign in with your shop account</p>

    <form [formGroup]="form" class="login-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
      </mat-form-field>

      <button mat-flat-button color="primary" class="login-btn" (click)="login()" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Login' }}
      </button>
      <mat-progress-spinner *ngIf="isLoading" mode="indeterminate" diameter="28"></mat-progress-spinner>

      <button mat-stroked-button class="login-btn" disabled>
        Phone OTP (Optional)
      </button>

      <a mat-button color="primary" routerLink="/register">Register New Shop</a>
    </form>

    <p class="error" *ngIf="error">{{ error }}</p>
  </mat-card>
</div>
