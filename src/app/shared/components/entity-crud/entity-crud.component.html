<mat-card class="crud-card">
  <mat-card-header>
    <mat-card-title>{{ title }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" class="crud-form" [class.two-columns]="useTwoColumns">
      <ng-container *ngFor="let field of fields">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ field.label }}</mat-label>

          <input
            *ngIf="field.type === 'text' || field.type === 'number' || field.type === 'date'"
            matInput
            [type]="field.type"
            [formControlName]="field.key"
          />

          <textarea
            *ngIf="field.type === 'textarea'"
            matInput
            rows="2"
            [formControlName]="field.key"
          ></textarea>

          <mat-select *ngIf="field.type === 'select'" [formControlName]="field.key">
            <mat-option *ngFor="let option of field.options || []" [value]="option">
              {{ option }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </ng-container>
    </form>

    <div class="button-row">
      <button mat-flat-button color="primary" (click)="save()" class="large-btn" [disabled]="isSaving">
        {{ isSaving ? 'Saving...' : editingId ? 'Update' : 'Add' }}
      </button>
      <button mat-stroked-button (click)="cancelEdit()" class="large-btn">Clear</button>
    </div>
  </mat-card-content>
</mat-card>

<mat-card class="crud-card">
  <div class="records-header">
    <mat-card-title>Records</mat-card-title>
    <button mat-stroked-button color="primary" (click)="printList()" *ngIf="!isLoading && dataSource.data.length > 0">
      <mat-icon>print</mat-icon>
      Print
    </button>
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Search</mat-label>
      <input matInput (input)="applyFilter($any($event.target).value)" placeholder="Filter records" />
    </mat-form-field>
  </div>
  <ng-container *ngIf="records$ | async as records">
    <div *ngIf="isLoading" class="empty-state">
      <mat-spinner diameter="26"></mat-spinner>
    </div>
    <div *ngIf="!isLoading && records.length === 0" class="empty-state">
      <mat-icon>inventory_2</mat-icon>
      <p>No records yet. Add your first record to get started.</p>
      <button mat-stroked-button color="primary">Add First Record</button>
    </div>
    <div class="table-wrap" *ngIf="!isLoading && records.length > 0">
      <table mat-table [dataSource]="dataSource" class="records-table">
        <ng-container *ngFor="let field of fields" [matColumnDef]="field.key">
          <th mat-header-cell *matHeaderCellDef>{{ field.label }}</th>
          <td mat-cell *matCellDef="let record">{{ displayValue(record, field.key) }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let record">
            <div class="record-actions">
              <button mat-mini-fab color="primary" (click)="edit(record)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-mini-fab color="accent" (click)="printRow(record)">
                <mat-icon>print</mat-icon>
              </button>
              <button mat-mini-fab color="warn" (click)="remove($any(record).id)">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns; trackBy: trackByRecord"></tr>
      </table>
    </div>
  </ng-container>
</mat-card>
