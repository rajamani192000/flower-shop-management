<app-page-header title="Shop Settings" subtitle="Configure profile, alerts, and operational preferences"></app-page-header>

<mat-card class="settings-card">
  <div class="actions">
    <button mat-flat-button color="primary" (click)="initializeDatabase()" [disabled]="isInitializing">
      {{ isInitializing ? 'Initializing...' : 'Initialize Database' }}
    </button>
  </div>

  <form class="settings-form" [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Shop Name</mat-label>
      <input matInput formControlName="shopName" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Shop ID</mat-label>
      <input matInput formControlName="shopCode" placeholder="SHOP001" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Phone</mat-label>
      <input matInput formControlName="phone" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Address</mat-label>
      <textarea matInput rows="2" formControlName="address"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>GST Number</mat-label>
      <input matInput formControlName="gstNumber" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Logo URL</mat-label>
      <input matInput formControlName="logoUrl" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Currency</mat-label>
      <mat-select formControlName="currency">
        <mat-option value="INR">INR</mat-option>
        <mat-option value="USD">USD</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Low Stock Threshold</mat-label>
      <input matInput type="number" formControlName="lowStockThreshold" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>High Credit Threshold</mat-label>
      <input matInput type="number" formControlName="highCreditThreshold" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Theme</mat-label>
      <mat-select formControlName="theme">
        <mat-option value="default">Default</mat-option>
        <mat-option value="compact">Compact</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Printer Paper Size</mat-label>
      <mat-select formControlName="printerPaperSize">
        <mat-option value="58mm">58mm</mat-option>
        <mat-option value="80mm">80mm</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Printer Type</mat-label>
      <mat-select formControlName="printerType">
        <mat-option value="thermal">Thermal</mat-option>
        <mat-option value="inkjet">Inkjet/Laser</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-slide-toggle formControlName="taxEnabled">Enable Tax</mat-slide-toggle>
    <mat-slide-toggle formControlName="lowStockAlert">Low Stock Alerts</mat-slide-toggle>
    <mat-slide-toggle formControlName="autoPrint">Auto Print After Sale</mat-slide-toggle>
  </form>

  <div class="actions">
    <button mat-flat-button color="primary" (click)="saveSettings()" [disabled]="isSaving">
      {{ isSaving ? 'Saving...' : 'Save Settings' }}
    </button>
  </div>
</mat-card>
