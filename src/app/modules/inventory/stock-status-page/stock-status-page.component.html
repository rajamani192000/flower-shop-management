<app-page-header title="Stock Status" subtitle="Opening + Purchases - Sales - Waste = Current Stock"></app-page-header>
<mat-card class="stock-card">
  <div class="list-header">
    <mat-form-field appearance="outline" class="table-search">
      <mat-label>Search stock</mat-label>
      <input matInput (input)="applyFilter($any($event.target).value)" placeholder="Filter by flower" />
    </mat-form-field>
  </div>
  <div class="table-wrap">
    <table mat-table [dataSource]="dataSource" matSort *ngIf="!isLoading && dataSource.data.length > 0">
      <ng-container matColumnDef="flower">
        <th mat-header-cell *matHeaderCellDef>Flower</th>
        <td mat-cell *matCellDef="let row">{{ row.flowerName }}</td>
      </ng-container>
      <ng-container matColumnDef="opening">
        <th mat-header-cell *matHeaderCellDef>Opening</th>
        <td mat-cell *matCellDef="let row">{{ row.openingStock }}</td>
      </ng-container>
      <ng-container matColumnDef="purchase">
        <th mat-header-cell *matHeaderCellDef>Purchase</th>
        <td mat-cell *matCellDef="let row">{{ row.purchases }}</td>
      </ng-container>
      <ng-container matColumnDef="sales">
        <th mat-header-cell *matHeaderCellDef>Sales</th>
        <td mat-cell *matCellDef="let row">{{ row.sales }}</td>
      </ng-container>
      <ng-container matColumnDef="waste">
        <th mat-header-cell *matHeaderCellDef>Waste</th>
        <td mat-cell *matCellDef="let row">{{ row.waste }}</td>
      </ng-container>
      <ng-container matColumnDef="current">
        <th mat-header-cell *matHeaderCellDef>Current</th>
        <td mat-cell *matCellDef="let row" [class.low]="row.isLow">{{ row.currentStock }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 20]"></mat-paginator>
    <div *ngIf="isLoading" class="empty-state">Loading stock...</div>
    <div *ngIf="!isLoading && dataSource.data.length === 0" class="empty-state">No stock data available</div>
  </div>
</mat-card>
